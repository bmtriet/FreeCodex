<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Repo safety audit workbench</title>
  <desc id="desc">Abstract report panels, code windows, and status marks for the FreeCodex audit service.</desc>
